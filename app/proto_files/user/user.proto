syntax = "proto3";

package user;

service UserService {
  rpc GetUser (UserRequest) returns (UserResponse);
  rpc ListUsers (ListUsersRequest) returns (ListUsersResponse);
  rpc CreateUser (CreateUserRequest) returns (UserResponse);
  rpc UpdateUserLocation (UpdateUserLocationRequest) returns (UserResponse);
  rpc CreateUserRating (CreateUserRatingRequest) returns (UserRatingResponse);
  rpc GetUserRatings (UserRequest) returns (UserRatingsResponse);
  rpc FollowUser (FollowUserRequest) returns (FollowUserResponse);
  rpc UpdateFollowStatus (FollowUserRequest) returns (FollowUserResponse);
  rpc GetPendingFollowRequests (UserRequest) returns (UserFollowersResponse);
  rpc GetUserFollowers (UserRequest) returns (UserFollowersResponse);
  rpc GetUserFollowing (UserRequest) returns (UserFollowersResponse);
  rpc CheckFollowingStatus (CheckFollowingRequest) returns (FollowUserResponse);
  // Media management
  rpc GetMedia (UserRequest) returns (MediaResponse);
  rpc UpdateProfilePhoto (UpdateUserPhotoRequest) returns (UserResponse);
  rpc UpdateCoverPhoto (UpdateUserPhotoRequest) returns (UserResponse);
  rpc SuggestedUsers (SuggestedUsersRequest) returns (ListUsersResponse);
  rpc CreateNotification (CreateNotificationRequest) returns (NotificationResponse);
  rpc ListNotifications (ListNotificationsRequest) returns (ListNotificationsResponse);
  rpc MarkNotificationRead (MarkNotificationReadRequest) returns (NotificationResponse);
}

message UserRequest {
  int64 id = 1;
}

message ListUsersRequest {
  string search = 1;
  int32 page = 2;
  int32 limit = 3;
}

message ListUsersResponse {
  repeated UserResponse users = 1;
  int32 total = 2;
}

message CreateUserRequest {
  string first_name = 1;
  string last_name = 2;
  string email = 3;
  string phone = 4;
  string password = 5;
  string role = 6;
  string address = 7;
  float latitude = 8;
  float longitude = 9;
  string bio = 10;
}

message UserResponse {
  int64 id = 1;
  string first_name = 2;
  string last_name = 3;
  string email = 4;
  string phone = 5;
  string profile_photo = 6;
  string role = 7;
  string address = 8;
  float latitude = 9;
  float longitude = 10;
  string bio = 11;
  bool isActive = 12;
  bool email_verified = 13;
  bool phone_verified = 14;
  string created_at = 15;
  // align with user_service field numbers to receive these values
  int64 cover_photo_id = 17;
  int64 profile_photo_id = 18;
}

// Aligned with user_service field numbers so review/rating_type deserialize correctly
message CreateUserRatingRequest {
  int64 rated_user_id = 1;
  int64 rated_by_user_id = 2;
  int32 rating_value = 3;
  string review = 4;
  string rating_type = 5;
}

message UserRatingResponse {
  int64 id = 1;
  int64 rated_user_id = 2;
  int64 rated_by_user_id = 3;
  int32 rating_value = 4;
  string review = 5;
  string rating_type = 6;
  string created_at = 7;
  string updated_at = 8;
}

message UserRatingsResponse {
  repeated UserRatingResponse ratings = 1;
}

message FollowUserRequest {
  int64 follower_id = 1;
  int64 following_id = 2;
  string followee_type = 3;
  string status = 4;
}

message FollowUserResponse {
  int64 id = 1;
  int64 follower_id = 2;
  int64 following_id = 3;
  string followee_type = 4;
  string status = 5;
  string followed_at = 6;
}

message UserFollowersResponse {
  repeated FollowUserResponse followers = 1;
}

message CheckFollowingRequest {
  int64 user_id = 1;
  int64 following_id = 2;
}

// Media messages aligned with user_service
message MediaRequest {
  int64 context_id = 1;
  string context_type = 2;
  string media_type = 3;
  string media_url = 4;
  int32 media_order = 5;
  int64 media_size = 6;
  string caption = 7;
  string file_path = 8;
  string file_name = 9;
  string content_type = 10;
}

message MediaResponse {
  int64 id = 1;
  int64 context_id = 2;
  string context_type = 3;
  string media_type = 4;
  string media_url = 5;
  int32 media_order = 6;
  int64 media_size = 7;
  string caption = 8;
  string uploaded_at = 9;
}

message UpdateUserPhotoRequest {
  int64 user_id = 1;
  MediaRequest media = 2;
}

message UpdateUserLocationRequest {
  int64 user_id = 1;
  float latitude = 2;
  float longitude = 3;
}

message SuggestedUsersRequest {
  int64 user_id = 1;
  int32 limit = 2;
}

message CreateNotificationRequest {
  int64 user_id = 1;
  string title = 2;
  string message = 3;
  string type = 4;
  string metadata = 5;
}

message NotificationResponse {
  int64 id = 1;
  int64 user_id = 2;
  string title = 3;
  string message = 4;
  string type = 5;
  bool read = 6;
  string created_at = 7;
  string metadata = 8;
}

message ListNotificationsRequest {
  int64 user_id = 1;
  int32 page = 2;
  int32 limit = 3;
}

message ListNotificationsResponse {
  repeated NotificationResponse notifications = 1;
  int32 total = 2;
}

message MarkNotificationReadRequest {
  int64 notification_id = 1;
  int64 user_id = 2;
}
